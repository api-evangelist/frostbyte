    description: Frostbyte Web Scraper API — Data & Analytics business capability. Self-contained, no shared references.
    resources:
    - name: v1-agent-scraper-api-extract
      path: /v1/agent-scraper/api/extract
      operations:
      - name: agentscraperpostapiextract
        method: POST
        description: Agent Scraper — /api/extract
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-agent-scraper-api-scrape
      path: /v1/agent-scraper/api/scrape
      operations:
      - name: agentscraperpostapiscrape
        method: POST
        description: Agent Scraper — /api/scrape
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: agentscrapergetapiscrape
        method: GET
        description: Agent Scraper — /api/scrape
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

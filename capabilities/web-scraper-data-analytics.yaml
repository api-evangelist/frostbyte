    namespace: web-scraper-data-analytics-rest
    port: 8080
    description: REST adapter for Frostbyte Web Scraper API — Data & Analytics. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/agent-scraper/api/extract
      name: v1-agent-scraper-api-extract
      description: REST surface for v1-agent-scraper-api-extract.
      operations:
      - method: POST
        name: agentscraperpostapiextract
        description: Agent Scraper — /api/extract
        call: web-scraper-data-analytics.agentscraperpostapiextract
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/agent-scraper/api/scrape

naftiko: 1.0.0-alpha2
info:
  label: Clawdia Agent Gateway API — Gateway
  description: 'Clawdia Agent Gateway API — Gateway. 8 operations. Lead operation: Public Analytics. Self-contained Naftiko
    capability covering one Frostbyte business surface.'
  tags:
  - Frostbyte
  - Gateway
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FROSTBYTE_API_KEY: FROSTBYTE_API_KEY
capability:
  consumes:
  - type: http
    namespace: agent-gateway-gateway
    baseUri: https://agent-gateway-kappa.vercel.app
    description: Clawdia Agent Gateway API — Gateway business capability. Self-contained, no shared references.
    resources:
    - name: api-analytics
      path: /api/analytics
      operations:
      - name: getanalytics
        method: GET
        description: Public Analytics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-credits-topup
      path: /api/credits/topup
      operations:
      - name: topupusdc
        method: POST
        description: Top Up Credits (USDC)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-credits-topup-xmr
      path: /api/credits/topup-xmr
      operations:
      - name: topupxmr
        method: POST
        description: Top Up Credits (XMR)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-keys-balance
      path: /api/keys/balance
      operations:
      - name: checkbalance
        method: GET
        description: Check Key Balance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-keys-create
      path: /api/keys/create
      operations:
      - name: createapikey
        method: POST
        description: Create API Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-payments-info
      path: /api/payments/info
      operations:
      - name: paymentinfo
        method: GET
        description: Payment Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-services
      path: /api/services
      operations:
      - name: listservices
        method: GET
        description: List All Services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: health
      path: /health
      operations:
      - name: healthcheck
        method: GET
        description: Health Check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.FROSTBYTE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: agent-gateway-gateway-rest
    port: 8080
    description: REST adapter for Clawdia Agent Gateway API — Gateway. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/analytics
      name: api-analytics
      description: REST surface for api-analytics.
      operations:
      - method: GET
        name: getanalytics
        description: Public Analytics
        call: agent-gateway-gateway.getanalytics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/credits/topup
      name: api-credits-topup
      description: REST surface for api-credits-topup.
      operations:
      - method: POST
        name: topupusdc
        description: Top Up Credits (USDC)
        call: agent-gateway-gateway.topupusdc
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/credits/topup-xmr
      name: api-credits-topup-xmr
      description: REST surface for api-credits-topup-xmr.
      operations:
      - method: POST
        name: topupxmr
        description: Top Up Credits (XMR)
        call: agent-gateway-gateway.topupxmr
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/keys/balance
      name: api-keys-balance
      description: REST surface for api-keys-balance.
      operations:
      - method: GET
        name: checkbalance
        description: Check Key Balance
        call: agent-gateway-gateway.checkbalance
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/keys/create
      name: api-keys-create
      description: REST surface for api-keys-create.
      operations:
      - method: POST
        name: createapikey
        description: Create API Key
        call: agent-gateway-gateway.createapikey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/payments/info
      name: api-payments-info
      description: REST surface for api-payments-info.
      operations:
      - method: GET
        name: paymentinfo
        description: Payment Info
        call: agent-gateway-gateway.paymentinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/services
      name: api-services
      description: REST surface for api-services.
      operations:
      - method: GET
        name: listservices
        description: List All Services
        call: agent-gateway-gateway.listservices
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/health
      name: health
      description: REST surface for health.
      operations:
      - method: GET
        name: healthcheck
        description: Health Check
        call: agent-gateway-gateway.healthcheck
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: agent-gateway-gateway-mcp
    port: 9090
    transport: http
    description: MCP adapter for Clawdia Agent Gateway API — Gateway. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: public-analytics
      description: Public Analytics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agent-gateway-gateway.getanalytics
      outputParameters:
      - type: object
        mapping: $.
    - name: top-up-credits-usdc
      description: Top Up Credits (USDC)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: agent-gateway-gateway.topupusdc
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: top-up-credits-xmr
      description: Top Up Credits (XMR)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: agent-gateway-gateway.topupxmr
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: check-key-balance
      description: Check Key Balance
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agent-gateway-gateway.checkbalance
      outputParameters:
      - type: object
        mapping: $.
    - name: create-api-key

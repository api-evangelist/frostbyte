apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: frostbyte-ip-geolocation
  provider: frostbyte
  api: ip-geolocation
spec:
  summary: Resolve IP addresses to geographic, timezone, and EU-status records.
  baseUrl: https://agent-gateway-kappa.vercel.app
  auth:
    type: bearer
    header: Authorization
    valueTemplate: 'Bearer {{ frostbyte.api_key }}'
  operations:
    - id: get-ip-geo
      method: GET
      path: /v1/agent-geo/api/ip/{ip}
    - id: get-own-ip
      method: GET
      path: /v1/agent-geo/api/me
    - id: batch-geo
      method: POST
      path: /v1/agent-geo/api/batch
    - id: get-distance
      method: GET
      path: /v1/agent-geo/api/distance
    - id: get-timezone
      method: GET
      path: /v1/agent-geo/api/timezone
  costPerCall: 1 credit

apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: frostbyte-crypto-prices
  provider: frostbyte
  api: crypto-prices
spec:
  summary: Live cryptocurrency price quotes and 24h OHLCV for 38+ pairs (Binance source).
  baseUrl: https://agent-gateway-kappa.vercel.app
  auth:
    type: bearer
    header: Authorization
    valueTemplate: 'Bearer {{ frostbyte.api_key }}'
  operations:
    - id: get-all-prices
      method: GET
      path: /v1/crypto-feeds/api/prices
    - id: get-markets
      method: GET
      path: /v1/crypto-feeds/api/markets
  costPerCall: 1 credit

apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: frostbyte-dns-lookup
  provider: frostbyte
  api: dns-lookup
spec:
  summary: Resolve domains, retrieve WHOIS, check propagation, and run batch DNS lookups.
  baseUrl: https://agent-gateway-kappa.vercel.app
  auth:
    type: bearer
    header: Authorization
    valueTemplate: 'Bearer {{ frostbyte.api_key }}'
  operations:
    - id: resolve
      method: GET
      path: /v1/agent-dns/api/resolve/{domain}
    - id: all-records
      method: GET
      path: /v1/agent-dns/api/all/{domain}
    - id: whois
      method: GET
      path: /v1/agent-dns/api/whois/{domain}
    - id: propagation
      method: GET
      path: /v1/agent-dns/api/propagation/{domain}
    - id: batch
      method: POST
      path: /v1/agent-dns/api/batch
  costPerCall: 1 credit

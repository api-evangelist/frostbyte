apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: frostbyte-code-execution
  provider: frostbyte
  api: code-execution
spec:
  summary: Sandboxed execution of Python, JavaScript, TypeScript, and Bash code.
  baseUrl: https://agent-gateway-kappa.vercel.app
  auth:
    type: bearer
    header: Authorization
    valueTemplate: 'Bearer {{ frostbyte.api_key }}'
  operations:
    - id: execute
      method: POST
      path: /v1/agent-coderunner/api/execute
    - id: create-session
      method: POST
      path: /v1/agent-coderunner/api/sessions
    - id: execute-in-session
      method: POST
      path: /v1/agent-coderunner/api/sessions/{id}/execute
    - id: list-languages
      method: GET
      path: /v1/agent-coderunner/api/languages
  costPerCall: 1 credit

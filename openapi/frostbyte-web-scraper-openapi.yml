openapi: 3.0.3
info:
  title: Frostbyte Web Scraper API
  description: Web scraping API. Extract text, HTML, or structured data from any webpage. Headless Chrome rendering for JavaScript-heavy
    sites.
  version: 1.0.0
  contact:
    name: Frostbyte API
    url: https://api-catalog-three.vercel.app
  license:
    name: MIT
servers:
- url: https://agent-gateway-kappa.vercel.app
  description: Production gateway
security:
- {}
- ApiKeyHeader: []
- ApiKeyQuery: []
paths:
  /v1/agent-scraper/api/scrape:
    post:
      tags:
      - Data & Analytics
      summary: "Agent Scraper \u2014 /api/scrape"
      description: Web content extraction. URL to markdown, text, HTML, or structured data. JavaScript rendering via Chromium.
      operationId: agent-scraper_post_api_scrape
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '402':
          description: Payment required (x402)
        '429':
          description: Rate limit exceeded
      requestBody:
        content:
          application/json:
            schema:
              type: object
    get:
      tags:
      - Data & Analytics
      summary: "Agent Scraper \u2014 /api/scrape"
      description: Web content extraction. URL to markdown, text, HTML, or structured data. JavaScript rendering via Chromium.
      operationId: agent-scraper_get_api_scrape
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '402':
          description: Payment required (x402)
        '429':
          description: Rate limit exceeded
  /v1/agent-scraper/api/extract:
    post:
      tags:
      - Data & Analytics
      summary: "Agent Scraper \u2014 /api/extract"
      description: Part of Agent Scraper
      operationId: agent-scraper_post_api_extract
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '402':
          description: Payment required (x402)
        '429':
          description: Rate limit exceeded
      requestBody:
        content:
          application/json:
            schema:
              type: object
components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key passed in header
    ApiKeyQuery:
      type: apiKey
      in: query
      name: key
      description: API key passed as query parameter
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
